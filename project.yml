name: FinanceTrack
options:
  bundleIdPrefix: com.scott
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

packages:
  LinkKit:
    url: https://github.com/plaid/plaid-link-ios-spm.git
    from: 7.0.0
  Supabase:
    url: https://github.com/supabase/supabase-swift.git
    from: 2.0.0

settings:
  base:
    SWIFT_VERSION: "5.0"
    CODE_SIGN_STYLE: Automatic
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "5"

targets:
  FinanceTrack:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: FinanceTrack
    resources:
      - path: FinanceTrack/Resources/Assets.xcassets
    info:
      path: FinanceTrack/Info.plist
      properties:
        CFBundleDisplayName: SpendSmart
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSFaceIDUsageDescription: "SpendSmart uses Face ID to protect access to your financial data."
        # Password-reset / email-confirmation deep link callback — see
        # AuthenticationService.resetPassword's redirectTo and SupabaseConfig. A custom scheme for
        # now (no web domain to host an apple-app-site-association file yet); swappable to a real
        # Associated Domain/Universal Link later without an auth-flow redesign.
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - spendsmart
            CFBundleURLName: com.scott.financetrack.auth-callback
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.scott.financetrack
        PRODUCT_NAME: FinanceTrack
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        SWIFT_EMIT_LOC_STRINGS: true
        ENABLE_PREVIEWS: true
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 2UZJX3TEG4
    dependencies:
      - package: LinkKit
      - package: Supabase
        product: Supabase
    capabilities: []

  FinanceTrackTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: FinanceTrackTests
    dependencies:
      - target: FinanceTrack
    settings:
      base:
        GENERATE_INFOPLIST_FILE: true

schemes:
  FinanceTrack:
    build:
      targets:
        FinanceTrack: all
        FinanceTrackTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - FinanceTrackTests
    archive:
      config: Release
